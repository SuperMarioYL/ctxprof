<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 360" width="880" height="360"
     font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif"
     role="img" aria-label="ctxprof architecture: a Claude Code JSONL session streams through the parser, gets per-block chars/4 weight estimates, is reconciled to real per-turn message.usage totals and classified into six buckets, then rendered as a flame tree or allocation_v1.json">
  <defs>
    <marker id="ah-l" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#B9B9C2"/></marker>
  </defs>
  <rect x="0" y="0" width="880" height="360" fill="#F5F5F7"/>

  <!-- pipeline frame -->
  <rect x="24" y="26" width="832" height="226" rx="18" fill="none" stroke="#0071E3" stroke-opacity="0.35" stroke-width="1.5" stroke-dasharray="6 5"/>
  <text x="44" y="48" font-size="13" font-weight="600" fill="#0A4F9E">one static binary · zero network · no model in the loop</text>

  <!-- connectors: pipeline -->
  <g stroke="#C9C9D0" stroke-width="1.6" fill="none">
    <line x1="206" y1="156" x2="248" y2="156" marker-end="url(#ah-l)"/>
    <line x1="392" y1="156" x2="434" y2="156" marker-end="url(#ah-l)"/>
    <line x1="640" y1="156" x2="682" y2="156" marker-end="url(#ah-l)"/>
  </g>

  <!-- Input: JSONL session -->
  <g>
    <rect x="40" y="110" width="166" height="92" rx="15" fill="#475569" fill-opacity="0.08" stroke="#475569" stroke-width="1.5"/>
    <text x="123" y="143" text-anchor="middle" font-size="14.5" font-weight="600" fill="#334155">Claude Code</text>
    <text x="123" y="162" text-anchor="middle" font-size="14.5" font-weight="600" fill="#334155">JSONL session</text>
    <text x="123" y="184" text-anchor="middle" font-size="10.5" fill="#64748B">~/.claude/projects/</text>
  </g>

  <!-- parser -->
  <g>
    <rect x="248" y="110" width="144" height="92" rx="15" fill="#0071E3" fill-opacity="0.10" stroke="#0071E3" stroke-width="1.5"/>
    <text x="320" y="142" text-anchor="middle" font-size="14.5" font-weight="600" fill="#0A4F9E">parser</text>
    <text x="320" y="162" text-anchor="middle" font-size="10.5" fill="#3B6FA8">stream turns +</text>
    <text x="320" y="178" text-anchor="middle" font-size="10.5" fill="#3B6FA8">typed blocks</text>
  </g>

  <!-- estimate -->
  <g>
    <rect x="434" y="110" width="206" height="92" rx="15" fill="#0071E3" fill-opacity="0.10" stroke="#0071E3" stroke-width="1.5"/>
    <text x="537" y="142" text-anchor="middle" font-size="14.5" font-weight="600" fill="#0A4F9E">estimate</text>
    <text x="537" y="162" text-anchor="middle" font-size="10.5" fill="#3B6FA8">chars/4 weight per block</text>
    <text x="537" y="178" text-anchor="middle" font-size="10.5" fill="#3B6FA8">(BPE slot for v0.2)</text>
  </g>

  <!-- attribute -->
  <g>
    <rect x="682" y="110" width="158" height="92" rx="15" fill="#5E5CE6" fill-opacity="0.10" stroke="#5E5CE6" stroke-width="1.5"/>
    <text x="761" y="138" text-anchor="middle" font-size="14.5" font-weight="600" fill="#4B3FC4">attribute</text>
    <text x="761" y="158" text-anchor="middle" font-size="10.5" fill="#5A52C9">classify blocks +</text>
    <text x="761" y="174" text-anchor="middle" font-size="10.5" fill="#5A52C9">reconcile to usage</text>
  </g>

  <!-- reconcile note -->
  <text x="44" y="232" font-size="11" fill="#6E6E73">per-turn weights scaled to the real <tspan font-weight="600" fill="#4B3FC4">message.usage</tspan> total — session sum is exact, per-bucket splits are calibrated estimates</text>

  <!-- six buckets row (output of attribute) -->
  <text x="44" y="284" font-size="13" font-weight="600" fill="#0B6B53">six buckets</text>
  <g font-size="11.5" font-weight="600">
    <rect x="44"  y="298" width="106" height="40" rx="11" fill="#10A37F" fill-opacity="0.10" stroke="#10A37F" stroke-width="1.3"/>
    <text x="97"  y="323" text-anchor="middle" fill="#0B6B53">system</text>
    <rect x="160" y="298" width="106" height="40" rx="11" fill="#10A37F" fill-opacity="0.12" stroke="#10A37F" stroke-width="1.3"/>
    <text x="213" y="323" text-anchor="middle" fill="#0B6B53">skill</text>
    <rect x="276" y="298" width="106" height="40" rx="11" fill="#10A37F" fill-opacity="0.14" stroke="#10A37F" stroke-width="1.3"/>
    <text x="329" y="323" text-anchor="middle" fill="#0B6B53">mcp</text>
    <rect x="392" y="298" width="106" height="40" rx="11" fill="#10A37F" fill-opacity="0.10" stroke="#10A37F" stroke-width="1.3"/>
    <text x="445" y="323" text-anchor="middle" fill="#0B6B53">file</text>
    <rect x="508" y="298" width="106" height="40" rx="11" fill="#10A37F" fill-opacity="0.13" stroke="#10A37F" stroke-width="1.3"/>
    <text x="561" y="323" text-anchor="middle" fill="#0B6B53">reasoning</text>
    <rect x="624" y="298" width="106" height="40" rx="11" fill="#10A37F" fill-opacity="0.11" stroke="#10A37F" stroke-width="1.3"/>
    <text x="677" y="323" text-anchor="middle" fill="#0B6B53">output</text>
  </g>

  <!-- render outputs: buckets -> render (tree | json) -->
  <g stroke="#C9C9D0" stroke-width="1.6" fill="none">
    <line x1="730" y1="318" x2="770" y2="318" marker-end="url(#ah-l)"/>
  </g>
  <g>
    <rect x="772" y="298" width="68" height="40" rx="11" fill="#0071E3" fill-opacity="0.10" stroke="#0071E3" stroke-width="1.3"/>
    <text x="806" y="314" text-anchor="middle" font-size="11" font-weight="600" fill="#0A4F9E">render</text>
    <text x="806" y="329" text-anchor="middle" font-size="10" fill="#3B6FA8">tree · json</text>
  </g>
</svg>
